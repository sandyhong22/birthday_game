<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>рҹҺӮ BIRTHDAY QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Jf Open Huninn';
  src: url('https://cdn.jsdelivr.net/gh/justfont/open-huninn-font/font/jf-openhuninn-2.1.ttf') format('truetype');
  font-display: swap;
}
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  overflow: hidden;
  height: 100%;
}
body {
  background: #0a0a1a;
  color: #e8e8e8;
  font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 10px;
  width: 100%; height: 100%;
  overflow: hidden;
}

/* STARFIELD */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

/* SCREENS */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center;
  z-index: 10;
  overflow-y: auto;
  opacity: 0; transition: opacity 0.35s;
  pointer-events: none;
}
.screen.active { opacity: 1; pointer-events: all; }

/* HUD */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 50;
  background: #0a0a1a;
  border-bottom: 3px solid #222;
  padding: 10px 16px 8px;
  display: none;
}
#hud.visible { display: block; }
.hud-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.hud-stage { font-size: 11px; color: #ffe600; }
.hud-stars { font-size: 11px; letter-spacing: 2px; }
/* custom pixel progress bar */
.px-progress {
  width: 100%; height: 14px;
  border: 2px solid #00ff41;
  background: #0a0a1a;
  display: block;
  padding: 2px;
}
.px-progress-inner {
  height: 100%;
  background: #00ff41;
  transition: width 0.5s;
  width: 0%;
}
/* custom pixel button */
.px-btn-main {
  font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 10px; padding: 12px 20px;
  border: 3px solid #00ff41; background: #0a0a1a; color: #00ff41;
  cursor: pointer; width: 100%; letter-spacing: 1px;
  box-shadow: 3px 3px 0 #00ff41;
}
.px-btn-main:active { transform: translate(3px,3px); box-shadow: none; }
.px-btn-sub {
  font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 9px; padding: 10px 16px;
  border: 3px solid #888; background: #0a0a1a; color: #888;
  cursor: pointer; width: 100%; letter-spacing: 1px;
  box-shadow: 3px 3px 0 #888;
}
.px-btn-sub:active { transform: translate(3px,3px); box-shadow: none; }
/* pixel container box */
.px-container {
  border: 3px solid #e8e8e8;
  background: #0f0f2e;
  box-shadow: 4px 4px 0 #444;
}

/* TITLE SCREEN */
#screen-title {
  justify-content: center; gap: 18px;
  padding: 24px 20px;
  background: #0a0a1a;
}
.title-chars { display: flex; gap: 28px; align-items: flex-end; }
.char-label { font-size: 7px; color: #ff4da6; text-align: center; margin-top: 6px; line-height: 1.8; }
.title-box {
  width: 100%; max-width: 360px;
  padding: 18px 16px; text-align: center;
  background: #0f0f2e !important;
}
.title-main {
  font-size: 18px; color: #ffe600; line-height: 1.8;
  text-shadow: 0 0 16px #ffe600;
  animation: glow 1.5s infinite alternate;
  margin-bottom: 10px;
}
.title-sub { font-size: 11px; color: #00e5ff; margin-bottom: 12px; line-height: 2; }
.title-names { font-size: 13px; color: #ff4da6; line-height: 2.4; margin-bottom: 10px; }
.blink { animation: blink 1s step-end infinite; }

.start-area {
  display: flex; flex-direction: column; gap: 10px;
  align-items: center; width: 100%; max-width: 360px;
}

/* STAGE SCREEN */
#screen-stage {
  padding-top: 76px;
  justify-content: flex-end;
  background: #0a0a1a;
}
.scene-area {
  flex: 1; display: flex;
  align-items: center; justify-content: center;
  gap: 12px; padding: 12px 16px;
}
.char-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.char-wrap canvas { image-rendering: pixelated; animation: bob 2s ease-in-out infinite; }
.char-wrap:nth-child(1) canvas { animation-delay: 0.4s; }
.char-name-tag { font-size: 11px; color: #ff4da6; text-align: center; }
.scene-emoji { font-size: 52px; animation: float 3s ease-in-out infinite; }

/* DIALOG */
.dialog-wrap { padding: 0 14px 20px; width: 100%; max-width: 440px; flex-shrink: 0; }
.dialog-box {
  border: 4px solid #e8e8e8; background: #0a0a1a; padding: 14px;
}
.dialog-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 2px solid #333;
}
.npc-av { font-size: 26px; }
.npc-nm { font-size: 13px; color: #ffe600; }
.npc-tp { font-size: 9px; color: #555; margin-left: auto; }
.dialog-text { font-size: 13px; line-height: 2.2; color: #e8e8e8; min-height: 56px; }
.cursor {
  display: inline-block; width: 8px; height: 13px;
  background: #e8e8e8; vertical-align: middle;
  animation: blink 0.7s step-end infinite; margin-left: 2px;
}

/* CHOICES */
.choices { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.c-btn {
  width: 100%; border: 3px solid #00ff41; background: #0a0a1a;
  color: #00ff41; font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 12px; padding: 12px 10px; text-align: left; cursor: pointer;
  line-height: 1.8;
}
.c-btn:active, .c-btn:focus { background: #00ff41; color: #0a0a1a; }
.c-btn::before { content: 'в–¶ '; }

/* INPUT */
.input-area { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.px-input {
  width: 100%; border: 3px solid #00e5ff !important; background: #0f0f2e !important;
  color: #00e5ff !important; font-family: 'Press Start 2P', 'Jf Open Huninn', cursive !important;
  font-size: 16px !important; padding: 12px 10px; outline: none; letter-spacing: 3px;
  pointer-events: auto !important;
  user-select: text !important;
  -webkit-user-select: text !important;
  cursor: text !important;
  -webkit-appearance: none;
  border-radius: 0;
}
.px-input::placeholder { color: #555; }
.px-btn {
  width: 100%; border: 3px solid #ffe600; background: #0a0a1a;
  color: #ffe600; font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 12px; padding: 12px; cursor: pointer; letter-spacing: 2px;
}
.px-btn:active { background: #ffe600; color: #0a0a1a; }
.result { margin-top: 8px; font-size: 12px; line-height: 2; min-height: 18px; }
.result.ok { color: #00ff41; }
.result.fail { color: #ff3c3c; animation: shake 0.3s; }

/* COOP */
.coop-box {
  margin-top: 10px; border: 3px solid #ff4da6; padding: 12px;
  background: #1a0022; font-size: 11px; line-height: 2.2; color: #ff4da6;
}
.coop-code { font-size: 18px; color: #ffe600; letter-spacing: 6px; text-align: center; margin: 10px 0; }
.coop-url { color: #00e5ff; font-size: 6px; word-break: break-all; }
.tabs { display: flex; margin-top: 10px; }
.tab {
  flex: 1; border: 3px solid #b44fff; background: #0a0a1a;
  color: #b44fff; font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 11px; padding: 10px 4px; cursor: pointer; text-align: center;
}
.tab.on { background: #b44fff; color: #0a0a1a; }

/* ENDING */
#screen-ending {
  justify-content: center; gap: 16px;
  padding: 24px 20px; background: #0a0a1a; text-align: center;
}
.end-title {
  font-size: 16px; color: #ffe600; line-height: 1.8;
  animation: glow 1s infinite alternate;
}
.end-chars { display: flex; justify-content: center; gap: 28px; align-items: flex-end; }
.end-box {
  width: 100%; max-width: 360px;
  border: 4px solid #ff4da6; padding: 18px;
  background: #0f0f2e;
}
.end-text { font-size: 13px; line-height: 2.4; }
.end-names { font-size: 14px; color: #ff4da6; margin-top: 14px; line-height: 2.2; }

#canvas-fw { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

/* NOTIF */
#notif {
  position: fixed; top: 14px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  z-index: 200; border: 3px solid #00ff41; background: #0a0a1a;
  color: #00ff41; font-family: 'Press Start 2P', 'Jf Open Huninn', cursive;
  font-size: 8px; padding: 10px 16px; transition: transform 0.3s;
  white-space: nowrap; line-height: 1.8;
}
#notif.show { transform: translateX(-50%) translateY(0); }
#notif.err { border-color: #ff3c3c; color: #ff3c3c; }

/* ANIMATIONS */
@keyframes blink { 50% { opacity: 0; } }
@keyframes glow {
  from { text-shadow: 0 0 8px currentColor; }
  to { text-shadow: 0 0 28px currentColor, 0 0 50px currentColor; }
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* NES overrides */
</style>
</head>

function drawChar(data, canvas, scale) {
  canvas.width = 10 * scale;
  canvas.height = data.length * scale;
  canvas.style.imageRendering = 'pixelated';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  data.forEach((row, y) => {
    row.forEach((code, x) => {
      if (code && PCOLORS[code]) {
        ctx.fillStyle = PCOLORS[code];
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    });
  });
}

function initChars(scale, container, isEnding) {
  if (isEnding) {
    container.innerHTML = '';
    const wrap1 = mkCharWrap(C1, scale, CFG.p1Name);
    const wrap2 = mkCharWrap(C2, scale, CFG.p2Name);
    container.appendChild(wrap1);
    container.appendChild(wrap2);
  } else {
    drawChar(C1, document.getElementById('cv1'), scale);
    drawChar(C2, document.getElementById('cv2'), scale);
  }
}

function mkCharWrap(data, scale, name) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:8px';
  const cv = document.createElement('canvas');
  cv.style.imageRendering = 'pixelated';
  cv.style.animation = 'bob 2s ease-in-out infinite';
  drawChar(data, cv, scale);
  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:11px;color:#ff4da6;text-align:center';
  lbl.textContent = name;
  wrap.appendChild(cv); wrap.appendChild(lbl);
  return wrap;
}

(function() {

    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({length:80}, () => ({

    }));
  }
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.a += s.da; if(s.a>1||s.a<0) s.da*=-1;
      ctx.fillStyle = `rgba(200,220,255,${s.a})`;
      ctx.fillRect(s.x,s.y,s.r*2,s.r*2);
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize', resize); resize(); draw();
})();

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let fwOn = false;
(function() {
  const c = document.getElementById('canvas-fw'), ctx = c.getContext('2d');
  let parts = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  addEventListener('resize', resize); resize();
  function burst(x, y) {
    const cols = ['#ffe600','#ff4da6','#00e5ff','#00ff41','#b44fff','#ff3c3c'];
    for (let i=0; i<40; i++) {
      const a = (Math.PI*2*i/40)+Math.random()*0.3, sp = Math.random()*5+2;
      parts.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
        c: cols[~~(Math.random()*cols.length)], life:1, sz:Math.random()*5+3 });
    }
  }
  function loop() {
    if (!fwOn) { requestAnimationFrame(loop); return; }
    ctx.fillStyle = 'rgba(10,10,26,0.18)'; ctx.fillRect(0,0,c.width,c.height);
    parts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.015;
      ctx.globalAlpha=p.life; ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,p.sz,p.sz);
    });
    ctx.globalAlpha=1; parts=parts.filter(p=>p.life>0); requestAnimationFrame(loop);
  }
  loop();
  window.startFW = function() {
    fwOn = true; let n=0;
    const iv = setInterval(() => {
      burst(Math.random()*innerWidth, Math.random()*innerHeight*0.7);
      if(++n>30) clearInterval(iv);
    }, 200);
  };
})();

let actx;
function tone(f, d, t='square', v=0.15) {
  try {
    if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+d);
    o.start(); o.stop(actx.currentTime+d);
  } catch(e){}
}

let tyTimer;
function typeText(elId, text, cb) {
  const el = document.getElementById(elId);
  el.innerHTML = ''; let i = 0;
  clearInterval(tyTimer);
  tyTimer = setInterval(() => {
    if (i < text.length) {
      const ch = text[i];
      el.innerHTML = text.substring(0,i+1).replace(/\n/g,'<br>') + '<span class="cursor"></span>';
      if (ch !== ' ' && ch !== '\n' && i%3===0) tone(580+Math.random()*200,.03,'square',.04);
      i++;
    } else {
      el.innerHTML = text.replace(/\n/g,'<br>');
      clearInterval(tyTimer);
      if (cb) setTimeout(cb, 300);
    }
  }, 38);
}

function startGame() {
  tone(440,.1);
  const progress = getProgress();
  if (progress.length >= STAGES.length) { showEnding(); return; }
  const next = STAGES.find(s => !progress.includes(s.id));
  enterStage(next);
}

function resetGame() {
  localStorage.removeItem('bq2');
  sessionStorage.removeItem('coop4');
  fwOn = false;
  document.getElementById('start-btn').textContent = 'в–¶ START GAME';
  showScreen('screen-title');
}

function enterStage(stage) {
  if (_s1AnimId) { cancelAnimationFrame(_s1AnimId); _s1AnimId = null; }
  const idx = STAGES.findIndex(s => s.id === stage.id);
  const done = getProgress().length;
  // Update HUD
  document.getElementById('hud-stage').textContent = `STAGE ${idx+1} / 5`;
  document.getElementById('hud-bar').style.width = (done / STAGES.length * 100) + '%';
  document.getElementById('hud-stars').textContent = 'вӯҗ'.repeat(done) + 'вҳҶ'.repeat(5-done);
  // Update dialog header
  document.getElementById('npc-av').textContent = stage.npcAv;
  document.getElementById('npc-nm').textContent = stage.npcNm;
  document.getElementById('npc-tp').textContent = `STAGE ${idx+1}`;
  document.getElementById('scene-emoji').textContent = stage.scene;
  document.getElementById('stage-content').innerHTML = '';
  // Draw chars
  initChars(6, null, false);
  showScreen('screen-stage');
  typeText('dialog-text', stage.dialog, () => renderContent(stage));
}

function completeStage(stage) {
  sndClear();
  markDone(stage.id);
  const done = getProgress().length;
  document.getElementById('hud-bar').style.width = (done / STAGES.length * 100) + '%';
  document.getElementById('hud-stars').textContent = 'вӯҗ'.repeat(done) + 'вҳҶ'.repeat(5-done);
  const idx = STAGES.findIndex(s => s.id === stage.id);
  const next = STAGES[idx + 1];
  if (!next) {
    notif('рҹҺү ALL STAGES CLEAR!');
    setTimeout(() => showEnding(), 1800);
  } else {
    notif(`рҹҺү STAGE ${idx+1} CLEAR!`);
    setTimeout(() => enterStage(next), 1800);
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  STAGE 1 PIXEL ANIMATION
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function startStage1Anim(container) {
  const PX = 5, CW = 72, CH = 22;
  const cv = document.createElement('canvas');
  cv.width = CW * PX; cv.height = CH * PX;
  cv.style.cssText = 'image-rendering:pixelated;display:block;width:100%;margin-bottom:12px;border:2px solid #222;';
  container.appendChild(cv);
  const ctx = cv.getContext('2d');
  const p = (x, y, c) => {
    if (x < 0 || x >= CW || y < 0 || y >= CH) return;
    ctx.fillStyle = c; ctx.fillRect(x*PX, y*PX, PX, PX);
  };
  let t = 0;
  const CYCLE = 140;
  const STARS = [[5,2],[12,4],[20,1],[35,3],[50,2],[65,4],[25,5]];

  function draw() {
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, cv.width, cv.height);

    // й–ғзҲҚжҳҹжҳҹ
    STARS.forEach(([sx, sy]) => p(sx, sy, Math.floor(t/15)%2===0 ? '#aaa' : '#555'));

    // ең°жқҝ
    for (let x = 0; x < CW; x++) {
      p(x, CH-3, '#1a1a1a'); p(x, CH-2, '#242424'); p(x, CH-1, '#2e2e2e');
    }
    // и·Ҝйқўиҷӣз·ҡ
    const dash = Math.floor(t/4) % 8;
    for (let x = -dash; x < CW; x += 8) { p(x+3, CH-2, '#555'); p(x+4, CH-2, '#555'); }

    // --- йқ’иӣҷ ---
    const frogX = Math.floor((t % CYCLE) * (CW / CYCLE));
    const hop   = Math.floor(t/8) % 2 === 0 ? 0 : -2;
    const fy    = CH - 3 - 4 + hop;
    [
      [frogX+1,fy,  '#81C784'],[frogX+2,fy,  '#81C784'],
      [frogX,  fy+1,'#4CAF50'],[frogX+1,fy+1,'#4CAF50'],[frogX+2,fy+1,'#4CAF50'],[frogX+3,fy+1,'#4CAF50'],
      [frogX,  fy+2,'#4CAF50'],[frogX+1,fy+2,'#1a1a1a'],[frogX+2,fy+2,'#4CAF50'],[frogX+3,fy+2,'#1a1a1a'],
      [frogX,  fy+3,'#388E3C'],[frogX+3,fy+3,'#388E3C'],
    ].forEach(([x,y,c]) => p(x,y,c));

    // --- зҫ…з¬Ё ---
    const close = frogX > CW - 20;
    const sk    = close && Math.floor(t/3)%2===0 ? 1 : 0;
    const ppx   = CW - 11 + sk;
    const ppy   = CH - 3 - 9;
    // й ӯй«®ж·ұи—Қ
    p(ppx,  ppy,  '#1A237E'); p(ppx+1,ppy,  '#1A237E'); p(ppx+2,ppy,  '#1A237E');
    p(ppx-1,ppy+1,'#1A237E'); p(ppx+3,ppy+1,'#1A237E');
    // иҮү
    p(ppx,  ppy+1,'#FFDAB9'); p(ppx+1,ppy+1,'#FFDAB9'); p(ppx+2,ppy+1,'#FFDAB9');
    // зңјзқӣ / еҳҙе·ҙ
    p(ppx,  ppy+2,'#2C1810'); p(ppx+2,ppy+2,'#2C1810');
    p(ppx+1,ppy+2, close ? '#cc0000' : '#FFDAB9');
    // иә«й«”и—Қ
    p(ppx,  ppy+3,'#2196F3'); p(ppx+1,ppy+3,'#2196F3'); p(ppx+2,ppy+3,'#2196F3');
    p(ppx,  ppy+4,'#2196F3'); p(ppx+1,ppy+4,'#2196F3'); p(ppx+2,ppy+4,'#2196F3');
    // иЈҷеӯҗз¶ 
    p(ppx-1,ppy+5,'#43A047'); p(ppx,  ppy+5,'#43A047'); p(ppx+1,ppy+5,'#43A047');
    p(ppx+2,ppy+5,'#43A047'); p(ppx+3,ppy+5,'#43A047');
    // и…ҝ
    p(ppx,  ppy+6,'#FFDAB9'); p(ppx+2,ppy+6,'#FFDAB9');

    if (close) {
      // жүӢиҮӮиҲүиө·
      p(ppx+3,ppy+3,'#FFDAB9'); p(ppx+4,ppy+2,'#FFDAB9');
      // жүӢж©ҹ
      p(ppx+5,ppy+1,'#222'); p(ppx+6,ppy+1,'#222');
      p(ppx+5,ppy+2,'#555'); p(ppx+6,ppy+2,'#4FC3F7');
      p(ppx+5,ppy+3,'#555'); p(ppx+6,ppy+3,'#555');
      p(ppx+5,ppy+4,'#222'); p(ppx+6,ppy+4,'#222');
      // иЁҠиҷҹжіў
      if (Math.floor(t/4)%2===0) {
        p(ppx+7,ppy+1,'#FFD700'); p(ppx+8,ppy,  '#FFD700'); p(ppx+9,ppy-1,'#FFD700');
      }
      // !! й©ҡеҡҮ
      if (Math.floor(t/5)%2===0) {
        p(ppx-3,ppy-1,'#FF4DA6'); p(ppx-3,ppy,  '#FF4DA6'); p(ppx-3,ppy+2,'#FF4DA6');
        p(ppx-2,ppy-1,'#FF4DA6'); p(ppx-2,ppy,  '#FF4DA6'); p(ppx-2,ppy+2,'#FF4DA6');
      }
    }

    t++;
    _s1AnimId = requestAnimationFrame(draw);
  }
  draw();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  STAGE CONTENT RENDERERS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderContent(stage) {
  const box = document.getElementById('stage-content');
  if (stage.type === 'choice') renderChoice(box, stage);
  else if (stage.type === 'password') renderPW(box, stage);
  else if (stage.type === 'coop-c') renderCoopC(box, stage);
  else if (stage.type === 'coop-a') renderCoopA(box, stage);
}

function renderChoice(box, stage) {
  const div = document.createElement('div'); div.className = 'choices';
  const res = mkResult();
  stage.choices.forEach(c => {
    const btn = document.createElement('button'); btn.className = 'c-btn';
    btn.textContent = c.text;
    btn.onclick = () => {
      if (c.ok) {
        res.className='result ok'; res.textContent=stage.right; sndOk();
        if (stage.id === 1) {
          setTimeout(() => startStage1Anim(box), 400);
          setTimeout(() => completeStage(stage), 4000);
        } else {
          setTimeout(() => completeStage(stage), 1200);
        }
      }
      else { res.className='result fail'; res.textContent=stage.wrong; sndErr(); }
    };
    div.appendChild(btn);
  });
  box.appendChild(div); box.appendChild(res);
}

function renderPW(box, stage) {
  const area = document.createElement('div'); area.className = 'input-area';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'px-input';
  inp.placeholder = stage.hint;
  inp.autocomplete = 'off';
  inp.autocorrect = 'off';
  inp.autocapitalize = 'off';
  inp.spellcheck = false;
  const btn = document.createElement('button'); btn.className = 'px-btn'; btn.textContent = 'в–¶ CONFIRM';
  const res = mkResult();
  const check = () => {
    if (inp.value.toUpperCase().trim() === stage.answer.toUpperCase()) {
      res.className='result ok'; res.textContent=stage.right; sndOk(); setTimeout(()=>completeStage(stage),1200);
    } else {
      res.className='result fail'; res.textContent=stage.wrong; sndErr();
    }
  };
  btn.onclick = check; inp.onkeydown = e => e.key==='Enter' && check();
  area.appendChild(inp); area.appendChild(btn);
  box.appendChild(area); box.appendChild(res);
  setTimeout(() => inp.focus(), 100);
  box.addEventListener('click', () => inp.focus());
}

function renderCoopC(box, stage) {
  const full = stage.p1code + stage.p2code;
  const cbox = document.createElement('div'); cbox.className = 'coop-box';
  if (PLAYER === 1) {
    cbox.innerHTML = `вҡ”пёҸ CO-OP й—ңеҚЎ<br>дҪ жҳҜ PLAYER 1<br>дҪ зҡ„зүҮж®өпјҡ<div class="coop-code">${stage.p1code}</div>е‘ҠиЁҙ P2 дҪ зҡ„зүҮж®өпјҢеҗҲй«”еҫҢијёе…ҘпјҒ`;
  } else if (PLAYER === 2) {
    cbox.innerHTML = `вҡ”пёҸ CO-OP й—ңеҚЎ<br>дҪ жҳҜ PLAYER 2<br>дҪ зҡ„зүҮж®өпјҡ<div class="coop-code">${stage.p2code}</div>е‘ҠиЁҙ P1 дҪ зҡ„зүҮж®өпјҢеҗҲй«”еҫҢијёе…ҘпјҒ`;
  } else {
    cbox.innerHTML = `вҡ”пёҸ CO-OP й—ңеҚЎ<br>еҲҶдә«йҖЈзөҗзөҰе…©дҪҚеӢҮиҖ…пјҡ<br><br>P1:<br><span class="coop-url">${location.origin}${location.pathname}?p=1</span><br><br>P2:<br><span class="coop-url">${location.origin}${location.pathname}?p=2</span>`;
  }
  const area = document.createElement('div'); area.className = 'input-area';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'px-input'; inp.placeholder = stage.hint;
  inp.autocomplete = 'off'; inp.autocorrect = 'off'; inp.autocapitalize = 'off'; inp.spellcheck = false;
  const btn = document.createElement('button'); btn.className='px-btn'; btn.textContent='в–¶ CONFIRM';
  const res = mkResult();
  const check = () => {
    if (inp.value.trim() === full) {
      res.className='result ok'; res.textContent=stage.right; sndOk(); setTimeout(()=>completeStage(stage),1200);
    } else {
      res.className='result fail'; res.textContent=stage.wrong; sndErr();
    }
  };
  btn.onclick=check; inp.onkeydown=e=>e.key==='Enter'&&check();
  area.appendChild(inp); area.appendChild(btn);
  box.appendChild(cbox); box.appendChild(area); box.appendChild(res);
}

function renderCoopA(box, stage) {
  let cur = PLAYER || 1;
  const state = JSON.parse(sessionStorage.getItem('coop4') || '{"p1":false,"p2":false}');
  const tabs = document.createElement('div'); tabs.className = 'tabs';
  const t1 = document.createElement('button'); t1.className='tab'; t1.textContent=`P1: ${CFG.p1Name}`;
  const t2 = document.createElement('button'); t2.className='tab'; t2.textContent=`P2: ${CFG.p2Name}`;
  const qa = document.createElement('div');
  const res = mkResult();

  function showQ(p) {
    cur = p; t1.className='tab'+(p===1?' on':''); t2.className='tab'+(p===2?' on':'');
    qa.innerHTML=''; res.textContent='';
    const q = p===1 ? stage.p1q : stage.p2q;
    const cs = p===1 ? stage.p1choices : stage.p2choices;
    const done = p===1 ? state.p1 : state.p2;
    if (done) {
      qa.innerHTML = `<div class="result ok" style="margin-top:10px">вң… PLAYER ${p} е·ІйҖҡйҒҺпјҒ</div>`;
      return;
    }
    const qd = document.createElement('div');
    qd.style.cssText = 'font-size:13px;color:#00e5ff;line-height:2.2;margin:10px 0';
    qd.innerHTML = q.replace(/\n/g,'<br>');
    const cd = document.createElement('div'); cd.className='choices';
    cs.forEach(c => {
      const btn = document.createElement('button'); btn.className='c-btn'; btn.textContent=c.text;
      btn.onclick = () => {
        if (c.ok) {
          if(p===1) state.p1=true; else state.p2=true;
          sessionStorage.setItem('coop4', JSON.stringify(state));
          res.className='result ok'; res.textContent=stage.right; sndOk();
          if (state.p1 && state.p2) { setTimeout(()=>completeStage(stage),1200); }
          else { setTimeout(()=>showQ(p===1?2:1), 1000); }
        } else {
          res.className='result fail'; res.textContent=stage.wrong; sndErr();
        }
      };
      cd.appendChild(btn);
    });
    qa.appendChild(qd); qa.appendChild(cd);
  }
  t1.onclick=()=>showQ(1); t2.onclick=()=>showQ(2);
  tabs.appendChild(t1); tabs.appendChild(t2);
  box.appendChild(tabs); box.appendChild(qa); box.appendChild(res);
  showQ(cur);
}

function mkResult() {
  const d = document.createElement('div'); d.className='result'; return d;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  ENDING
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showEnding() {
  showScreen('screen-ending');
  document.getElementById('end-names').innerHTML = `рҹҢҹ ${CFG.p1Name} &amp; ${CFG.p2Name} рҹҢҹ<br>з”ҹж—Ҙеҝ«жЁӮпјҒ`;
  initChars(9, document.getElementById('end-chars'), true);
  startFW();
  const el = document.getElementById('end-text');
  el.innerHTML = '';
  const txt = CFG.ending.join('\n');
  let i = 0;
  const iv = setInterval(() => {
    if (i < txt.length) { el.innerHTML = txt.substring(0,++i).replace(/\n/g,'<br>'); }
    else clearInterval(iv);
  }, 60);
}
</script>
